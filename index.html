<style>
:root {
  --bg-page: #FAF8F3;
  --bg-card: #FFFFFF;
  --bg-secondary: #F0EBDE;
  --bg-tertiary: #FAF8F3;
  --border: #E8E2D3;
  --border-light: #E0DCD0;
  --text-primary: #3E2817;
  --text-secondary: #8B7355;
  --text-tertiary: #B5A48A;
  --accent: #C85A3C;
  --accent-hover: #E88B5C;
  --accent-pressed: #A04428;
  --accent-bg: #F4D4A4;
  --accent-bg-text: #8B5A2B;
  --success: #7A8B5C;
  --warning: #D4A73C;
  --danger: #B33A28;
  --info: #6B8CAE;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 80px;
}

input, button, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

button {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
  color: inherit;
}

/* ============ Header ============ */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 4px;
}

.logo {
  width: 36px;
  height: 36px;
  position: relative;
  flex-shrink: 0;
}

.logo-circle-1 {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-bg);
  top: 4px;
  left: 4px;
}

.logo-circle-2 {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  top: 14px;
  left: 14px;
}

.brand {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  padding-bottom: 2px;
}

.brand-char {
  height: 32px;
  width: auto;
  display: block;
}

.brand-char + .brand-char {
  margin-left: -2px;
}

.brand-sep {
  color: var(--text-tertiary);
  font-size: 14px;
  font-weight: 300;
  line-height: 1;
  padding-bottom: 2px;
  margin-left: 4px;
}

.brand-en {
  font-size: 11px;
  color: var(--text-secondary);
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  font-style: italic;
  letter-spacing: 0.03em;
  line-height: 1;
  padding-bottom: 2px;
}

.header-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.header-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
}

.header-btn:hover {
  background: var(--bg-secondary);
}

.header-btn svg {
  width: 18px;
  height: 18px;
}

/* ============ Date Nav ============ */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 16px;
  user-select: none;
}

.date-nav-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 50%;
  color: var(--text-secondary);
  transition: all 0.15s;
  flex-shrink: 0;
}

.date-nav-btn:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-color: var(--border-light);
}

.date-nav-btn:active {
  transform: scale(0.94);
}

.date-nav-btn svg {
  width: 14px;
  height: 14px;
  display: block;
}

.date-nav-center {
  cursor: pointer;
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: end;
  gap: 16px;
  flex: 1;
}

.date-nav-center:hover {
  background: var(--bg-secondary);
}

.date-month {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.02em;
  line-height: 1.2;
  padding-bottom: 4px;
  text-align: right;
  justify-self: end;
}

.date-day {
  font-size: 48px;
  font-weight: 400;
  color: var(--accent);
  font-family: -apple-system, system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
  line-height: 1;
  letter-spacing: -0.02em;
  text-align: center;
  justify-self: center;
}

.date-sub {
  font-size: 20px;
  color: var(--text-secondary);
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  font-style: italic;
  letter-spacing: 0.01em;
  line-height: 1.2;
  padding-bottom: 4px;
  text-align: left;
  justify-self: start;
}

/* ============ Card ============ */
.card {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 12px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.card-title-meta {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 400;
}

.edit-btn {
  padding: 4px;
  margin: -4px;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}

.edit-btn:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.edit-btn svg {
  width: 14px;
  height: 14px;
  display: block;
}

.empty-hint {
  font-size: 13px;
  color: var(--text-tertiary);
  text-align: center;
  padding: 12px 0;
}

/* ============ Weight Card ============ */
.weight-rows {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.weight-row {
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: grid;
  grid-template-columns: minmax(110px, auto) 1fr;
  gap: 12px;
  align-items: center;
}

.weight-row-info {
  display: flex;
  flex-direction: column;
}

.weight-row-label {
  font-size: 11px;
  color: var(--text-secondary);
}

.weight-row-value {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: -apple-system, system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
  line-height: 1.1;
  margin-top: 2px;
}

.weight-row-value-empty {
  font-size: 22px;
  font-weight: 400;
  color: var(--text-tertiary);
  font-family: -apple-system, system-ui, "Helvetica Neue", Helvetica, Arial, sans-serif;
  line-height: 1.1;
  margin-top: 2px;
}

.weight-row-unit {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 3px;
}

.weight-row-meta {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 4px;
  font-family: ui-serif, Georgia, "Times New Roman", serif;
  font-style: italic;
}

.weight-spark {
  height: 46px;
  width: 100%;
}

.weight-more {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 14px;
  cursor: pointer;
  user-select: none;
  padding: 4px 8px;
  transition: color 0.15s;
}

.weight-more:hover {
  color: var(--text-primary);
}

.weight-more-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.25s;
}

.weight-more.open .weight-more-icon {
  transform: rotate(180deg);
}

.weight-more-icon svg {
  width: 10px;
  height: 10px;
  display: block;
}

.weight-detail {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}

.weight-detail.open {
  display: flex;
}

/* ============ Meal Card ============ */
.meal-item {
  padding: 6px 0 6px 10px;
  margin-bottom: 10px;
  cursor: pointer;
  border-left: 2px solid var(--accent-bg);
  transition: background 0.15s;
}

.meal-item:last-child {
  margin-bottom: 0;
}

.meal-item:hover {
  background: var(--bg-tertiary);
}

.meal-item.dinner {
  border-left-color: var(--accent);
}

.meal-item.snack {
  border-left-color: var(--success);
}

.meal-item.drink {
  border-left-color: var(--info);
}

.meal-item-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.meal-item-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}

.meal-item-nums {
  font-size: 11px;
  color: var(--text-secondary);
}

.meal-item-desc {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.meal-day-total {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.meal-day-total .label {
  color: var(--text-secondary);
}

.meal-day-total .value {
  color: var(--text-primary);
  font-weight: 500;
}

/* ============ Supplement Chips ============ */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  border: 0.5px solid transparent;
}

.chip.on {
  background: var(--accent-bg);
  color: var(--accent-bg-text);
}

.chip.off {
  background: var(--bg-tertiary);
  color: var(--text-tertiary);
  border-color: var(--border);
}

.chip:hover {
  opacity: 0.8;
}

/* ============ Activity ============ */
.activity-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}

.activity-item + .activity-item {
  border-top: 0.5px solid var(--border);
  padding-top: 10px;
  margin-top: 4px;
}

.activity-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-primary);
}

.activity-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
}

.activity-dot.bike {
  background: var(--info);
}

.activity-meta {
  font-size: 11px;
  color: var(--text-secondary);
}

/* ============ Modal ============ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(62, 40, 23, 0.4);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  padding: 0;
}

.modal-backdrop.open {
  display: flex;
}

.modal {
  background: var(--bg-page);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
  animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

@media (min-width: 640px) {
  .modal-backdrop {
    align-items: center;
    padding: 20px;
  }
  .modal {
    border-radius: var(--radius-lg);
    max-height: 85vh;
  }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
}

.modal-close {
  font-size: 24px;
  color: var(--text-tertiary);
  line-height: 1;
  padding: 4px 8px;
  margin: -4px -8px;
}

.modal-close:hover {
  color: var(--text-primary);
}

.field {
  margin-bottom: 14px;
}

.field-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.field-input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(200, 90, 60, 0.1);
}

.field-input[type="number"] {
  font-variant-numeric: tabular-nums;
  -moz-appearance: textfield;
  appearance: textfield;
}

.field-input[type="number"]::-webkit-inner-spin-button,
.field-input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field-row-3 {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 10px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 0.5px solid var(--border);
}

.btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #FFF;
}

.btn-primary:hover {
  background: var(--accent-hover);
}

.btn-primary:active {
  background: var(--accent-pressed);
}

.btn-secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 0.5px solid var(--border);
}

.btn-secondary:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 0.5px solid var(--border);
}

.btn-danger:hover {
  background: rgba(179, 58, 40, 0.06);
}

.btn-success {
  background: var(--success);
  color: #FFF;
}

.btn-icon-only {
  flex: 0 0 auto;
  padding: 12px;
}

.btn-check {
  background: var(--success);
  color: #FFF;
}

.btn-check:hover {
  background: #8D9F6C;
}

/* Tabs / segmented control */
.segment {
  display: flex;
  gap: 4px;
  background: var(--bg-tertiary);
  padding: 3px;
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}

.segment button {
  flex: 1;
  padding: 8px 4px;
  font-size: 12px;
  color: var(--text-secondary);
  border-radius: 6px;
  transition: all 0.15s;
}

.segment button.active {
  background: var(--bg-card);
  color: var(--text-primary);
  font-weight: 500;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

/* Detail list item (for meal detail items within modal) */
.detail-item {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
  position: relative;
}

.detail-item-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 18px;
  line-height: 1;
}

.detail-item-remove:hover {
  background: var(--bg-secondary);
  color: var(--danger);
}

.detail-add-btn {
  width: 100%;
  padding: 10px;
  border: 0.5px dashed var(--border-light);
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 14px;
  transition: all 0.15s;
}

.detail-add-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(200, 90, 60, 0.03);
}

/* Calendar */
.cal {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 14px;
}

.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cal-title {
  font-size: 14px;
  font-weight: 500;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-week {
  font-size: 10px;
  color: var(--text-tertiary);
  text-align: center;
  padding: 4px 0;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-primary);
  position: relative;
}

.cal-day.other {
  color: var(--text-tertiary);
}

.cal-day.today {
  font-weight: 500;
  color: var(--accent);
}

.cal-day.selected {
  background: var(--accent);
  color: #FFF;
}

.cal-day:not(.selected):hover {
  background: var(--bg-secondary);
}

.cal-day.has-data::after {
  content: "";
  position: absolute;
  bottom: 3px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--accent);
}

.cal-day.selected.has-data::after {
  background: #FFF;
}

/* Activity chip group in modal */
.type-chips {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}

.type-chip {
  flex: 1;
  padding: 10px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
}

.type-chip.selected {
  background: var(--accent-bg);
  color: var(--accent-bg-text);
  border-color: var(--accent);
}

/* Cooking method chips */
.cook-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.cook-chip {
  padding: 6px 12px;
  border: 0.5px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}

.cook-chip.selected {
  background: var(--accent-bg);
  color: var(--accent-bg-text);
  border-color: var(--accent);
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--text-primary);
  color: #FFF;
  padding: 10px 18px;
  border-radius: var(--radius-md);
  font-size: 13px;
  opacity: 0;
  transition: transform 0.25s, opacity 0.25s;
  z-index: 200;
  pointer-events: none;
  max-width: 90vw;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Settings page sections */
.settings-section {
  margin-bottom: 24px;
}

.settings-section-title {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 500;
}

.settings-section-title.danger {
  color: var(--danger);
}

.settings-row {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.settings-row-action {
  cursor: pointer;
  transition: background 0.15s;
}

.settings-row-action:hover {
  background: var(--bg-secondary);
}

.settings-row-info {
  flex: 1;
  min-width: 0;
}

.settings-row-label {
  font-size: 14px;
  color: var(--text-primary);
  font-weight: 500;
}

.settings-row-desc {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.settings-row-arrow {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.settings-row-arrow svg {
  width: 12px;
  height: 12px;
  display: block;
}

.settings-action-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.settings-action-row.danger .settings-row-label {
  color: var(--danger);
}

/* Status badge */
.sync-status-badge {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 5px 10px 5px 22px;
  font-size: 11px;
  color: var(--text-secondary);
  display: none;
  align-items: center;
  z-index: 60;
  box-shadow: 0 2px 8px rgba(62, 40, 23, 0.06);
}

.sync-status-badge.show {
  display: inline-flex;
}

.sync-status-badge::before {
  content: "";
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-tertiary);
}

.sync-status-badge.synced::before { background: var(--success); }
.sync-status-badge.syncing::before {
  background: var(--warning);
  animation: pulse-dot 1.4s infinite;
}
.sync-status-badge.offline::before { background: var(--text-tertiary); }
.sync-status-badge.error::before { background: var(--danger); }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Settings menu */
.menu {
  position: fixed;
  right: 16px;
  top: 56px;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 6px;
  min-width: 180px;
  display: none;
  z-index: 50;
  box-shadow: 0 4px 16px rgba(62, 40, 23, 0.1);
}

.menu.open {
  display: block;
}

.menu button {
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text-primary);
  border-radius: 6px;
}

.menu button:hover {
  background: var(--bg-secondary);
}

.menu hr {
  border: none;
  border-top: 0.5px solid var(--border);
  margin: 4px 0;
}

/* Small helpers */
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.text-tertiary { color: var(--text-tertiary); }
.text-secondary { color: var(--text-secondary); }
.text-center { text-align: center; }
.hidden { display: none !important; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* =========================================================
   知己 · Know Yourself — 主要邏輯
   資料存在 IndexedDB,key 以日期字串 (YYYY-MM-DD) 為主
   ========================================================= */

// ---------- IndexedDB 封裝 ----------
const DB_NAME = 'zhiji';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('weight')) db.createObjectStore('weight', { keyPath: 'date' });
      if (!db.objectStoreNames.contains('meals')) {
        const s = db.createObjectStore('meals', { keyPath: 'id', autoIncrement: true });
        s.createIndex('date', 'date', { unique: false });
      }
      if (!db.objectStoreNames.contains('supplements')) db.createObjectStore('supplements', { keyPath: 'date' });
      if (!db.objectStoreNames.contains('activities')) {
        const s = db.createObjectStore('activities', { keyPath: 'id', autoIncrement: true });
        s.createIndex('date', 'date', { unique: false });
      }
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
      // 同步佇列:標記哪些日期需要推到 GitHub
      if (!db.objectStoreNames.contains('sync_queue')) {
        db.createObjectStore('sync_queue', { keyPath: 'date' });
      }
      // 記錄 GitHub 上每個檔案的 sha (寫入時必須帶 sha 才能更新)
      if (!db.objectStoreNames.contains('sync_meta')) {
        db.createObjectStore('sync_meta', { keyPath: 'date' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbPut(store, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function idbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function idbGetByIndex(store, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// 同步狀態
let syncStatus = 'idle'; // 'idle' | 'syncing' | 'synced' | 'offline' | 'error'
let syncDebounceTimer = null;

function setSyncStatus(status, msg) {
  syncStatus = status;
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  badge.classList.remove('synced', 'syncing', 'offline', 'error');
  if (status === 'idle') {
    badge.classList.remove('show');
    return;
  }
  badge.classList.add('show', status);
  if (msg) {
    badge.textContent = msg;
  } else {
    const labels = {
      syncing: '同步中…',
      synced: '已同步',
      offline: '離線(已存本機)',
      error: '同步失敗'
    };
    badge.textContent = labels[status] || status;
  }
  // synced 顯示 2 秒後消失
  if (status === 'synced') {
    setTimeout(() => {
      if (syncStatus === 'synced') setSyncStatus('idle');
    }, 2000);
  }
}

// 取得 GitHub 設定
async function getGithubConfig() {
  const rec = await idbGet('settings', 'github');
  return (rec && rec.value && rec.value.token && rec.value.user && rec.value.repo) ? rec.value : null;
}

// 把某天標記為 dirty (待同步)
async function markDirty(dateStr) {
  await idbPut('sync_queue', { date: dateStr, ts: Date.now() });
  scheduleSyncSoon();
}

// 防抖的同步觸發器:1.5 秒沒新動作才實際開始同步
function scheduleSyncSoon() {
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(() => { syncToGithub(); }, 1500);
}

// 把單一天的本機資料聚合成一個 day JSON object
async function buildDayPayload(dateStr) {
  const weight = await idbGet('weight', dateStr);
  const supps = await idbGet('supplements', dateStr);
  const meals = await idbGetByIndex('meals', 'date', dateStr);
  const acts = await idbGetByIndex('activities', 'date', dateStr);
  return {
    date: dateStr,
    weight: weight || null,
    supplements: supps || null,
    meals: meals || [],
    activities: acts || [],
    updatedAt: new Date().toISOString()
  };
}

// 從遠端 day JSON 寫回本機 (用於拉取時)
async function applyRemoteDay(remote) {
  const dateStr = remote.date;
  // weight
  if (remote.weight) {
    await idbPut('weight', remote.weight);
  } else {
    await idbDelete('weight', dateStr);
  }
  // supplements
  if (remote.supplements) {
    await idbPut('supplements', remote.supplements);
  } else {
    await idbDelete('supplements', dateStr);
  }
  // meals - 先刪該日所有,再寫入
  const localMeals = await idbGetByIndex('meals', 'date', dateStr);
  for (const m of localMeals) await idbDelete('meals', m.id);
  if (remote.meals && remote.meals.length) {
    // 注意:remote 可能沒有 id,需要重新分配
    const cleanedMeals = remote.meals.map(m => {
      const c = { ...m };
      delete c.id;  // 讓 IDB autoIncrement 重新給
      return c;
    });
    await idbBulkPut('meals', cleanedMeals);
  }
  // activities
  const localActs = await idbGetByIndex('activities', 'date', dateStr);
  for (const a of localActs) await idbDelete('activities', a.id);
  if (remote.activities && remote.activities.length) {
    const cleanedActs = remote.activities.map(a => {
      const c = { ...a };
      delete c.id;
      return c;
    });
    await idbBulkPut('activities', cleanedActs);
  }
}

// 合併遠端與本機 (新增合併、修改後寫贏)
function mergeDayPayload(local, remote) {
  if (!remote) return local;
  if (!local) return remote;

  const localTs = local.updatedAt ? new Date(local.updatedAt).getTime() : 0;
  const remoteTs = remote.updatedAt ? new Date(remote.updatedAt).getTime() : 0;
  const localNewer = localTs >= remoteTs;

  // weight: 後寫贏
  const weight = localNewer ? local.weight : remote.weight;
  // supplements: 後寫贏
  const supplements = localNewer ? local.supplements : remote.supplements;

  // meals: 用 (mealType + summary + 食材內容) 當識別,合併
  const mealKey = m => JSON.stringify({
    t: m.mealType,
    s: m.summary || '',
    items: (m.items || []).map(i => `${i.name}|${i.amount}|${i.unit}|${i.cooking}`).sort().join(';')
  });
  const seenMeals = new Map();
  [...(remote.meals || []), ...(local.meals || [])].forEach(m => {
    const k = mealKey(m);
    seenMeals.set(k, m);  // 後加的會覆蓋前面 (local 後加 -> local 贏 in conflict)
  });
  const meals = [...seenMeals.values()];

  // activities: 用 (type + distance + duration) 當識別,合併
  const actKey = a => `${a.type}|${a.distance}|${a.duration}`;
  const seenActs = new Map();
  [...(remote.activities || []), ...(local.activities || [])].forEach(a => {
    seenActs.set(actKey(a), a);
  });
  const activities = [...seenActs.values()];

  return {
    date: local.date,
    weight,
    supplements,
    meals,
    activities,
    updatedAt: new Date().toISOString()
  };
}

// 從 GitHub 取得某天的檔案 (回傳 {payload, sha} 或 null)
async function fetchRemoteDay(cfg, dateStr) {
  const path = `days/${dateStr}.json`;
  const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
  const resp = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  });
  if (resp.status === 404) return null;  // 檔案不存在
  if (!resp.ok) throw new Error(`GET ${path} failed: ${resp.status}`);
  const data = await resp.json();
  // content 是 base64
  const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
  const payload = JSON.parse(decoded);
  return { payload, sha: data.sha };
}

// 推某天的 payload 到 GitHub (含合併)
async function pushDay(cfg, dateStr) {
  const path = `days/${dateStr}.json`;
  const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;

  // 1. 取得遠端最新版本
  let remote = null;
  try {
    remote = await fetchRemoteDay(cfg, dateStr);
  } catch (err) {
    if (!err.message.includes('404')) throw err;
  }

  // 2. 取得本機 payload
  const local = await buildDayPayload(dateStr);

  // 3. 合併
  const merged = remote ? mergeDayPayload(local, remote.payload) : local;

  // 4. 把合併後的版本寫回本機 (這樣下次讀到的就是合併後的)
  if (remote) {
    await applyRemoteDay(merged);
  }

  // 5. 編碼 + PUT
  const content = JSON.stringify(merged, null, 2);
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const body = {
    message: `update ${dateStr}`,
    content: encoded
  };
  if (remote) body.sha = remote.sha;

  const resp = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`PUT ${path} failed: ${resp.status} ${txt.substring(0, 200)}`);
  }

  const result = await resp.json();
  // 紀錄新的 sha
  await idbPut('sync_meta', { date: dateStr, sha: result.content.sha });
}

// 主同步流程
async function syncToGithub() {
  if (syncStatus === 'syncing') return;  // 防重入

  const cfg = await getGithubConfig();
  if (!cfg) {
    console.warn('[sync] GitHub 未設定,跳過同步');
    return;
  }

  if (!navigator.onLine) {
    setSyncStatus('offline');
    return;
  }

  const queue = await idbGetAll('sync_queue');
  if (queue.length === 0) return;

  console.log(`[sync] 開始同步 ${queue.length} 筆`);
  setSyncStatus('syncing', `同步中… 0/${queue.length}`);

  let success = 0, failed = 0;
  // 按日期排序,讓進度可預測
  queue.sort((a, b) => a.date.localeCompare(b.date));

  for (let i = 0; i < queue.length; i++) {
    const item = queue[i];
    try {
      await pushDay(cfg, item.date);
      await idbDelete('sync_queue', item.date);
      success++;
      // 每 10 筆更新一次進度顯示 (太頻繁會卡)
      if ((i + 1) % 10 === 0 || i === queue.length - 1) {
        setSyncStatus('syncing', `同步中… ${i + 1}/${queue.length}`);
      }
    } catch (err) {
      console.error(`[sync] ${item.date} 失敗:`, err);
      failed++;
      // 失敗時不要立刻退出,繼續處理其他項目
      // 但連續失敗 5 筆就停 (避免持續打爆 API)
      if (failed >= 5) {
        console.error('[sync] 連續失敗過多,中止');
        break;
      }
    }
  }

  console.log(`[sync] 完成: 成功 ${success}, 失敗 ${failed}`);

  if (failed > 0) {
    setSyncStatus('error', `${failed} 筆失敗 (按齒輪→重新同步)`);
  } else {
    setSyncStatus('synced');
  }

  if (success > 0) {
    renderAll();
  }
}

// 清空 GitHub days/ 資料夾下所有檔案
// 這個動作不可逆,只在重新部署、重置時用
async function wipeGithubData() {
  const cfg = await getGithubConfig();
  if (!cfg) {
    toast('請先設定 GitHub');
    return;
  }

  setSyncStatus('syncing', '清空中… 取得檔案清單');

  try {
    // 1. 列出 days/ 下所有檔案
    let files = [];
    try {
      const listResp = await fetch(
        `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/days`,
        {
          headers: {
            'Authorization': `Bearer ${cfg.token}`,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        }
      );
      if (listResp.status === 404) {
        toast('GitHub 上 days/ 資料夾本來就是空的');
        setSyncStatus('idle');
        return;
      }
      if (!listResp.ok) throw new Error(`列檔失敗: ${listResp.status}`);
      files = await listResp.json();
    } catch (err) {
      console.error('[wipe] 列檔失敗:', err);
      setSyncStatus('error', '列檔失敗');
      toast('列檔失敗: ' + err.message);
      return;
    }

    if (!Array.isArray(files) || files.length === 0) {
      toast('GitHub 上沒有檔案要刪');
      setSyncStatus('idle');
      return;
    }

    console.log(`[wipe] 即將刪除 ${files.length} 個檔案`);

    // 2. 一個個刪
    let deleted = 0, failed = 0;
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      if (f.type !== 'file') continue;
      try {
        const delResp = await fetch(
          `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${f.path}`,
          {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${cfg.token}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `wipe ${f.name}`,
              sha: f.sha
            })
          }
        );
        if (delResp.ok) {
          deleted++;
          if ((i + 1) % 10 === 0 || i === files.length - 1) {
            setSyncStatus('syncing', `清空中… ${i + 1}/${files.length}`);
          }
        } else {
          failed++;
          console.error(`[wipe] 刪除 ${f.path} 失敗:`, delResp.status);
        }
      } catch (err) {
        failed++;
        console.error(`[wipe] 刪除 ${f.path} 例外:`, err);
      }
    }

    // 3. 同時清掉本機 sync_meta (因為遠端 sha 已失效)
    await new Promise((resolve, reject) => {
      const tx = db.transaction('sync_meta', 'readwrite');
      const req = tx.objectStore('sync_meta').clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });

    if (failed > 0) {
      setSyncStatus('error', `${failed} 筆刪除失敗`);
      toast(`已刪 ${deleted}/${files.length},${failed} 筆失敗`);
    } else {
      setSyncStatus('synced');
      toast(`已清空 ${deleted} 個檔案`);
    }
  } catch (err) {
    console.error('[wipe] 失敗:', err);
    setSyncStatus('error', '清空失敗');
    toast('清空失敗: ' + err.message);
  }
}

// 手動觸發重新同步 (給設定頁的「重試」按鈕用)

// 從 GitHub 拉取某天 (使用者主動觸發,或還原情境)
async function pullDayFromGithub(dateStr) {
  const cfg = await getGithubConfig();
  if (!cfg) throw new Error('GitHub 未設定');
  const remote = await fetchRemoteDay(cfg, dateStr);
  if (!remote) return false;
  await applyRemoteDay(remote.payload);
  await idbPut('sync_meta', { date: dateStr, sha: remote.sha });
  return true;
}

function idbBulkPut(store, items) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    items.forEach(item => s.put(item));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ---------- 日期工具 ----------
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function weekdayZh(d) {
  return ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
}

function humanDate(d) {
  const today = fmtDate(new Date());
  const tgt = fmtDate(d);
  if (tgt === today) return '今天';
  const yst = fmtDate(addDays(new Date(), -1));
  if (tgt === yst) return '昨天';
  const tmr = fmtDate(addDays(new Date(), 1));
  if (tgt === tmr) return '明天';
  return null;
}

// ---------- 體重卡 ----------
function calcDerived(w) {
  if (!w || w.weight == null) return null;
  const r = { ...w };
  if (w.fatPct != null) r.fatMass = +(w.weight * w.fatPct / 100).toFixed(2);
  if (w.musclePct != null) r.muscleMass = +(w.weight * w.musclePct / 100).toFixed(2);
  if (w.proteinPct != null) r.proteinMass = +(w.weight * w.proteinPct / 100).toFixed(2);
  if (r.fatMass != null) r.nonFat = +(w.weight - r.fatMass).toFixed(2);
  return r;
}

    return;

  // 取得過去 30 天的歷史資料 (以 currentDate 為終點)
  const history = await getWeightHistory(currentDate, 30);

  // 計算骨骼肌率序列 (用骨骼肌量 / 體重)
  const seriesWeight = history.map(d => d ? d.weight : null);
  const seriesFatPct = history.map(d => d ? d.fatPct : null);
  const seriesSkeletalMusclePct = history.map(d =>
    (d && d.weight && d.skeletalMuscle != null) ? +(d.skeletalMuscle / d.weight * 100).toFixed(2) : null
  );
  const seriesMusclePct = history.map(d => d ? d.musclePct : null);
  const seriesProteinPct = history.map(d => d ? d.proteinPct : null);
  const seriesSkeletalMuscle = history.map(d => d ? d.skeletalMuscle : null);
  const seriesFatMass = history.map(d => (d && d.weight && d.fatPct != null) ? +(d.weight * d.fatPct / 100).toFixed(2) : null);
  const seriesNonFat = history.map(d => (d && d.weight && d.fatPct != null) ? +(d.weight - d.weight * d.fatPct / 100).toFixed(2) : null);
  const seriesMuscleMass = history.map(d => (d && d.weight && d.musclePct != null) ? +(d.weight * d.musclePct / 100).toFixed(2) : null);
  const seriesProteinMass = history.map(d => (d && d.weight && d.proteinPct != null) ? +(d.weight * d.proteinPct / 100).toFixed(2) : null);

  // 計算骨骼肌率(當日)
  const skeletalMusclePct = (w.weight && w.skeletalMuscle != null)

      ${weightRowHtml('骨骼肌量', w.skeletalMuscle, 'kg', seriesSkeletalMuscle)}
      ${weightRowHtml('脂肪量', w.fatMass, 'kg', seriesFatMass)}
      ${weightRowHtml('非脂肪量', w.nonFat, 'kg', seriesNonFat)}
      ${weightRowHtml('肌肉量', w.muscleMass, 'kg', seriesMuscleMass)}
      ${weightRowHtml('蛋白質量', w.proteinMass, 'kg', seriesProteinMass)}
    </div>` : ''}
  `;

// 取得從 endDateStr 往前 days 天的歷史資料
async function getWeightHistory(endDateStr, days) {
  const result = [];
  const endDate = parseDate(endDateStr);
  for (let i = days - 1; i >= 0; i--) {
    const d = addDays(endDate, -i);
    const ds = fmtDate(d);
    const rec = await idbGet('weight', ds);

// 在 SVG 元素上畫 sparkline
function renderSparkline(svgEl, data) {
  // SVG viewBox 用實際寬高
  const rect = svgEl.getBoundingClientRect();
  const W = rect.width || 200;
  const H = rect.height || 46;
  const PAD_TOP = 6;
  const PAD_BOT = 6;
  const PAD_LEFT = 2;
  const PAD_RIGHT = 6;
  const innerW = W - PAD_LEFT - PAD_RIGHT;
  const innerH = H - PAD_TOP - PAD_BOT;

  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const valid = data.filter(v => v != null);
  if (valid.length < 2) {
    // 太少資料就顯示 placeholder
    svgEl.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#B5A48A" font-style="italic">need more data</text>`;
    return;
  }
  const vmin = Math.min(...valid);
  const vmax = Math.max(...valid);
  const padding = (vmax - vmin) * 0.15 || 0.5;
  const yMax = vmax + padding;
  const yMin = vmin - padding;
  const yRange = yMax - yMin || 1;

  const n = data.length;
  const stepX = innerW / (n - 1);

  const point = (i, v) => ({
    x: PAD_LEFT + i * stepX,
    y: PAD_TOP + innerH - ((v - yMin) / yRange) * innerH
  });

  // 切連續區段
  const segments = [];
  let current = [];
  data.forEach((v, i) => {
    if (v == null) {
      if (current.length) { segments.push(current); current = []; }
    } else {
      current.push({ i, v });
    }
  });
  if (current.length) segments.push(current);

  let svgContent = '';

  // 連續段:實線 path
  segments.forEach(seg => {
    if (seg.length < 2) return;
    const pts = seg.map(s => point(s.i, s.v));
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
    svgContent += `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;
  });

  // 段之間連虛線
  for (let i = 0; i < segments.length - 1; i++) {
    const last = segments[i][segments[i].length - 1];
    const next = segments[i + 1][0];
    const p1 = point(last.i, last.v);
    const p2 = point(next.i, next.v);
    svgContent += `<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke="var(--text-tertiary)" stroke-width="1" stroke-dasharray="3,3"/>`;
  }

  // 最新點 dot
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i] != null) {
      const p = point(i, data[i]);
      svgContent += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--accent)"/>`;
      svgContent += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.4"/>`;
      break;
    }
  }

  svgEl.innerHTML = svgContent;
}

function hasDetails(w) {

// ---------- 餐點卡 ----------
async function renderMealCard() {
  const body = document.getElementById('meal-body');
  const meals = await idbGetByIndex('meals', 'date', currentDate);

  if (meals.length === 0) {
    body.innerHTML = '<div class="empty-hint">尚未紀錄</div>';
    return;
  }

  const ordered = [];
  MEAL_TYPES.forEach(mt => {
    const grp = meals.filter(m => m.mealType === mt.key);
    grp.forEach(m => ordered.push({ ...m, typeLabel: mt.label }));
  });

  let totalKcal = 0, totalProt = 0;
  ordered.forEach(m => {
    totalKcal += (m.totalKcal || 0);
    totalProt += (m.totalProtein || 0);
  });

  const itemsHtml = ordered.map(m => {
    const typeClass = m.mealType === 'dinner' ? 'dinner'
      : m.mealType === 'snack' ? 'snack'
      : m.mealType === 'drink' ? 'drink' : '';
    const desc = m.summary || (m.items && m.items.length ? m.items.map(i => i.name).join('、') : '');
    const nums = [];
    if (m.totalKcal) nums.push(`${m.totalKcal} kcal`);
    if (m.totalProtein) nums.push(`${m.totalProtein}g P`);
    return `<div class="meal-item ${typeClass}" data-meal-id="${m.id}">
      <div class="meal-item-head">
        <div class="meal-item-label">${m.typeLabel}</div>
        <div class="meal-item-nums">${nums.join(' · ') || ''}</div>
      </div>
      ${desc ? `<div class="meal-item-desc">${esc(desc)}</div>` : ''}
    </div>`;
  }).join('');

  const totalRow = (totalKcal > 0 || totalProt > 0) ? `
    <div class="meal-day-total">
      <span class="label">當日合計</span>
      <span class="value">${totalKcal} kcal · ${totalProt.toFixed(1)}g P</span>
    </div>
  ` : '';

  body.innerHTML = itemsHtml + totalRow;

  body.querySelectorAll('.meal-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = Number(el.dataset.mealId);
      openMealModal(id);
    });
  });
}

// ---------- 保健品卡 ----------
async function renderSupplementCard() {
  const body = document.getElementById('supp-body');
  const countEl = document.getElementById('supp-count');

  const rec = await idbGet('supplements', currentDate);
  const settings = await idbGet('settings', 'supplements');
  const list = (settings && settings.value) ? settings.value : DEFAULT_SUPPLEMENTS;

  const taken = new Set((rec && rec.taken) ? rec.taken : list);

  countEl.textContent = `${taken.size} / ${list.length}`;

  body.innerHTML = `<div class="chip-row">${
    list.map(name => {
      const on = taken.has(name);
      return `<div class="chip ${on ? 'on' : 'off'}" data-name="${esc(name)}">${on ? '✓' : ''} ${esc(name)}</div>`;
    }).join('')
  }</div>`;

  body.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', async () => {
      const name = chip.dataset.name;
      const rec = await idbGet('supplements', currentDate);
      const taken = new Set((rec && rec.taken) ? rec.taken : list);
      if (taken.has(name)) taken.delete(name); else taken.add(name);
      await idbPut('supplements', { date: currentDate, taken: [...taken] });
      renderSupplementCard();
      markDirty(currentDate);
    });
  });
}

// ---------- Utils ----------
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function numOrEmpty(v) {
  if (v == null || v === '') return '';
  return String(v);
}

function toNum(v) {
  if (v === '' || v == null) return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

  document.querySelectorAll('#act-list .detail-item').forEach((el, i) => {

    activityDraft[i].distance = el.querySelector('.act-dist').value;

      <button class="detail-item-remove" data-rm="${idx}">×</button>

window.saveActivities = async function() {
  syncActivityInputs();

// ---------- 日曆選擇器 ----------
let calYear, calMonth;

function toggleCalendar() {
  const wrap = document.getElementById('calendar-wrap');
  if (wrap.classList.contains('hidden')) {
    const d = parseDate(currentDate);
    calYear = d.getFullYear();
    calMonth = d.getMonth();
    renderCalendar();
    wrap.classList.remove('hidden');
  } else {
    wrap.classList.add('hidden');
  }
}

async function renderCalendar() {
  const wrap = document.getElementById('calendar-wrap');
  const firstDay = new Date(calYear, calMonth, 1);
  const startDay = firstDay.getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDay; i++) {
    cells.push({ day: daysInPrev - startDay + 1 + i, other: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    cells.push({ day: i, other: false });
  }
  while (cells.length % 7 !== 0) {
    cells.push({ day: cells.length - daysInMonth - startDay + 1, other: true });
  }

  const weights = await idbGetAll('weight');
  const meals = await idbGetAll('meals');
  const acts = await idbGetAll('activities');
  const supps = await idbGetAll('supplements');
  const dataDates = new Set([
    ...weights.map(w => w.date),
    ...meals.map(m => m.date),
    ...acts.map(a => a.date),
    ...supps.map(s => s.date)
  ]);

  const todayStr = fmtDate(new Date());
  wrap.innerHTML = `
    <div class="cal">
      <div class="cal-head">
        <button class="date-nav-btn" id="cal-prev" aria-label="上個月"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg></button>
        <div class="cal-title">${calYear} 年 ${calMonth + 1} 月</div>
        <button class="date-nav-btn" id="cal-next" aria-label="下個月"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,3 11,8 6,13"/></svg></button>
      </div>
      <div class="cal-grid">
        ${['日','一','二','三','四','五','六'].map(w => `<div class="cal-week">${w}</div>`).join('')}
        ${cells.map(c => {
          const m = c.other
            ? (c.day > 20 ? calMonth - 1 : calMonth + 1)
            : calMonth;
          const y = c.other
            ? (m < 0 ? calYear - 1 : m > 11 ? calYear + 1 : calYear)
            : calYear;
          const mm = ((m + 12) % 12);
          const dateStr = fmtDate(new Date(y, mm, c.day));
          const classes = [];
          if (c.other) classes.push('other');
          if (dateStr === todayStr) classes.push('today');
          if (dateStr === currentDate) classes.push('selected');
          if (dataDates.has(dateStr)) classes.push('has-data');
          return `<div class="cal-day ${classes.join(' ')}" data-date="${dateStr}">${c.day}</div>`;
        }).join('')}
      </div>
    </div>
  `;

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });
  wrap.querySelectorAll('.cal-day').forEach(el => {
    el.addEventListener('click', () => {
      currentDate = el.dataset.date;
      wrap.classList.add('hidden');
      renderAll();
    });
  });
}

// ---------- 匯入 Excel ----------
async function handleImport(file) {
  try {
    const buf = await file.arrayBuffer();
    // raw:true + cellDates:true 確保:日期是 Date 物件、數值是 number
    // (raw:false 會把日期格式化成 Excel 顯示樣式如 "11/2",失去年份)
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });

    if (rows.length < 2) { toast('檔案是空的'); return; }

    let imported = 0, skipped = 0;
    const toImport = [];

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length === 0) continue;

      const rawDate = row[0];
      let dateStr = null;

      if (rawDate instanceof Date) {
        dateStr = fmtDate(rawDate);
      } else if (typeof rawDate === 'number') {
        // Excel 序列號:從 1900-01-01 起算的天數
        const d = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
        dateStr = fmtDate(d);
      } else if (typeof rawDate === 'string' && rawDate.trim()) {
        // 字串日期:只接受 YYYY-MM-DD 或 YYYY/M/D 之類含年份的格式
        const s = rawDate.trim();
        // 必須包含 4 位數字的年份才接受
        if (/\d{4}/.test(s)) {
          const parsed = new Date(s);
          if (!isNaN(parsed.getTime())) dateStr = fmtDate(parsed);
        }
      }

      if (!dateStr) { skipped++; continue; }

      const weight = toNum(row[1]);
      if (weight == null) { skipped++; continue; }

      toImport.push({
        date: dateStr,
        weight,
        fatPct: toNum(row[2]),
        musclePct: toNum(row[3]),
        proteinPct: toNum(row[4]),
        skeletalMuscle: toNum(row[5])
      });
      imported++;
    }

    if (imported === 0) { toast('沒有可匯入的資料'); return; }

    if (!confirm(`將匯入 ${imported} 筆體重資料,跳過 ${skipped} 筆空白。\n\n會覆蓋相同日期的既有資料,確定匯入?`)) return;

    await idbBulkPut('weight', toImport);
    // 標記所有匯入日期為待同步
    for (const item of toImport) {
      await idbPut('sync_queue', { date: item.date, ts: Date.now() });
    }
    toast(`已匯入 ${imported} 筆,開始同步到 GitHub…`);
    renderWeightCard();
    // 大量匯入時:直接立即同步 (不等 debounce)
    const cfg = await getGithubConfig();
    if (cfg) {
      // 用 setTimeout 0 讓 toast 先顯示,再開始長時間的同步
      setTimeout(() => syncToGithub(), 100);
    } else {
      // 沒設定 GitHub 的話提醒一下
      setTimeout(() => toast('提示:可在齒輪→GitHub 設定後同步到雲端'), 1500);
    }
  } catch (err) {
    console.error(err);
    toast('匯入失敗: ' + err.message);
  }
}

// ---------- 匯出 Markdown ----------
async function handleExport() {
  const weights = await idbGetAll('weight');
  const meals = await idbGetAll('meals');
  const acts = await idbGetAll('activities');
  const supps = await idbGetAll('supplements');
  const settings = await idbGet('settings', 'supplements');
  const suppList = (settings && settings.value) ? settings.value : DEFAULT_SUPPLEMENTS;

  const allDates = new Set([
    ...weights.map(w => w.date),
    ...meals.map(m => m.date),
    ...acts.map(a => a.date),
    ...supps.map(s => s.date)
  ]);
  const dates = [...allDates].sort();

  if (dates.length === 0) { toast('還沒有資料可以匯出'); return; }

  let md = `# 知己日誌匯出\n\n匯出時間: ${new Date().toLocaleString('zh-TW')}\n日期範圍: ${dates[0]} ～ ${dates[dates.length - 1]}\n共 ${dates.length} 天\n\n---\n\n`;

  for (const date of dates) {
    const d = parseDate(date);
    md += `## ${date} (星期${weekdayZh(d)})\n\n`;

    const w = calcDerived(weights.find(x => x.date === date));
    if (w) {
      md += `### 體重\n`;
      md += `- 體重: ${w.weight} kg\n`;
      if (w.fatPct != null) md += `- 體脂率: ${w.fatPct}% (${w.fatMass} kg)\n`;
      if (w.musclePct != null) md += `- 肌肉率: ${w.musclePct}% (${w.muscleMass} kg)\n`;
      if (w.proteinPct != null) md += `- 蛋白質率: ${w.proteinPct}% (${w.proteinMass} kg)\n`;
      if (w.skeletalMuscle != null) md += `- 骨骼肌量: ${w.skeletalMuscle} kg\n`;
      md += '\n';
    }

    const dayMeals = meals.filter(m => m.date === date);
    if (dayMeals.length > 0) {
      md += `### 餐點\n`;
      MEAL_TYPES.forEach(mt => {
        const grp = dayMeals.filter(m => m.mealType === mt.key);
        grp.forEach((m, i) => {
          const label = grp.length > 1 ? `${mt.label} (${i + 1})` : mt.label;
          md += `**${label}**`;
          if (m.summary) md += ` — ${m.summary}`;
          md += '\n';
          if (m.items && m.items.length) {
            m.items.forEach(it => {
              const cook = it.cooking && it.cooking !== '—' ? ` · ${it.cooking}` : '';
              md += `  - ${it.name} ${it.amount}${it.unit}${cook}\n`;
            });
          }
          const nums = [];
          if (m.totalKcal) nums.push(`${m.totalKcal} kcal`);
          if (m.totalProtein) nums.push(`${m.totalProtein}g 蛋白質`);
          if (nums.length) md += `  → ${nums.join(' · ')}\n`;
          md += '\n';
        });
      });
    }

    const suppRec = supps.find(s => s.date === date);
    if (suppRec) {
      const taken = suppRec.taken || [];
      md += `### 保健品\n`;
      md += `已服用 (${taken.length}): ${taken.join('、') || '無'}\n`;
      const missed = suppList.filter(s => !taken.includes(s));
      if (missed.length) md += `未服用: ${missed.join('、')}\n`;
      md += '\n';
    }

    const dayActs = acts.filter(a => a.date === date);
    if (dayActs.length > 0) {
      md += `### 活動\n`;
      dayActs.forEach(a => {
        const typeLabel = ACTIVITY_TYPES.find(t => t.key === a.type)?.label || a.type;
        const parts = [];
        if (a.distance) parts.push(`${a.distance} km`);
        if (a.duration) parts.push(`${a.duration} 分鐘`);
        md += `- ${typeLabel}: ${parts.join(' · ')}\n`;
      });
      md += '\n';
    }

    md += '---\n\n';
  }

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `zhiji_${fmtDate(new Date())}.md`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已匯出');
}

async function saveGithubConfig() {
  const user = document.getElementById('gh-user').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const token = document.getElementById('gh-token').value.trim();
  await idbPut('settings', { key: 'github', value: { user, repo, token } });
  document.getElementById('gh-status').style.color = 'var(--success)';
  document.getElementById('gh-status').textContent = '✓ 已儲存';
  toast('設定已儲存');
}

async function testGithubConnection() {
  const user = document.getElementById('gh-user').value.trim();
  const repo = document.getElementById('gh-repo').value.trim();
  const token = document.getElementById('gh-token').value.trim();

  const statusEl = document.getElementById('gh-status');

  if (!user || !repo || !token) {
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = '請完整填寫三個欄位';
    return;
  }

  statusEl.style.color = 'var(--text-secondary)';
  statusEl.textContent = '測試中...';

  try {
    const resp = await fetch(`https://api.github.com/repos/${user}/${repo}`, {
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    });
    if (resp.ok) {
      const data = await resp.json();
      statusEl.style.color = 'var(--success)';
      statusEl.textContent = `✓ 連線成功 · ${data.private ? 'Private' : 'Public'} repo`;
    } else if (resp.status === 401) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = '✗ Token 無效或已過期';
    } else if (resp.status === 404) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = '✗ 找不到 repo (檢查帳號和名稱)';
    } else {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = `✗ 連線失敗 (${resp.status})`;
    }
  } catch (err) {
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = '✗ 網路錯誤: ' + err.message;
  }
}

    const settingsAll = await idbGetAll('settings');

    // 把 settings 過濾掉 github token (避免不小心匯出)
    const safeSettings = settingsAll.filter(s => s.key !== 'github');

    const backup = {
      app: 'zhiji',
      version: 1,
      exportedAt: new Date().toISOString(),
      data: {
        weight: weights,
        meals: meals,
        supplements: supplements,
        activities: activities,
        settings: safeSettings
      }
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `zhiji-backup-${fmtDate(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`已匯出 ${weights.length + meals.length + supplements.length + activities.length} 筆資料`);
  } catch (err) {
    console.error(err);
    toast('匯出失敗: ' + err.message);
  }
}

async function handleImportJSON(file) {
  try {
    const text = await file.text();
    const backup = JSON.parse(text);

    if (backup.app !== 'zhiji' || !backup.data) {
      toast('檔案格式不對 (不是知己的備份檔)');
      return;
    }

    const counts = {
      weight: backup.data.weight?.length || 0,
      meals: backup.data.meals?.length || 0,
      supplements: backup.data.supplements?.length || 0,
      activities: backup.data.activities?.length || 0,
      settings: backup.data.settings?.length || 0
    };
    const total = counts.weight + counts.meals + counts.supplements + counts.activities;
    const exportTime = backup.exportedAt ? new Date(backup.exportedAt).toLocaleString('zh-TW') : '未知時間';

    if (!confirm(`即將從備份檔還原 ${total} 筆資料 (${counts.weight} 體重、${counts.meals} 餐點、${counts.supplements} 保健品、${counts.activities} 活動)\n\n備份時間: ${exportTime}\n\n⚠️ 會覆蓋本機既有的同日期資料!\n\n確定還原?`)) return;

    // 寫入各 store
    if (backup.data.weight) await idbBulkPut('weight', backup.data.weight);
    if (backup.data.meals) await idbBulkPut('meals', backup.data.meals);
    if (backup.data.supplements) await idbBulkPut('supplements', backup.data.supplements);
    if (backup.data.activities) await idbBulkPut('activities', backup.data.activities);
    if (backup.data.settings) await idbBulkPut('settings', backup.data.settings);

    toast(`已還原 ${total} 筆資料`);
    renderAll();
  } catch (err) {
    console.error(err);
    toast('還原失敗: ' + err.message);
  }
}

async function handleClearAll() {
  if (!confirm('⚠️ 即將刪除瀏覽器上的所有資料 (體重、餐點、保健品、活動)\n\n保留:GitHub 設定、保健品清單\n\n如果你之後要重新設定 GitHub 同步、會從 GitHub 拉回資料。\n\n確定刪除嗎?')) return;
  if (!confirm('再次確認:這個動作無法還原。確定?')) return;

  // 不刪 settings (要保留 github 設定和保健品清單)
  const stores = ['weight', 'meals', 'supplements', 'activities', 'sync_queue', 'sync_meta'];
  for (const store of stores) {
    await new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  closeModal();
  toast('已清除本機資料');
  renderAll();
}

// ---------- 事件綁定 ----------
function bindEvents() {
  document.getElementById('btn-prev-day').addEventListener('click', () => {
    currentDate = fmtDate(addDays(parseDate(currentDate), -1));
    renderAll();
  });
  document.getElementById('btn-next-day').addEventListener('click', () => {
    currentDate = fmtDate(addDays(parseDate(currentDate), 1));
    renderAll();
  });
  document.getElementById('btn-pick-date').addEventListener('click', toggleCalendar);

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (backdrop.classList.contains('open')) {
      if (e.key === 'Escape') closeModal();
      return;
    }
    if (e.key === 'ArrowLeft') {
      currentDate = fmtDate(addDays(parseDate(currentDate), -1));
      renderAll();
    } else if (e.key === 'ArrowRight') {
      currentDate = fmtDate(addDays(parseDate(currentDate), 1));
      renderAll();
    }
  });

  document.querySelectorAll('[data-modal]').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.modal;
      if (type === 'weight') openWeightModal();
      else if (type === 'meal') openMealModal();
      else if (type === 'supp') openSupplementModal();
      else if (type === 'activity') openActivityModal();
    });
  });

  // Menu
  const menu = document.getElementById('menu');
  document.getElementById('btn-menu').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target)) menu.classList.remove('open');
  });
  // 齒輪 -> 設定頁
  document.getElementById('btn-settings').addEventListener('click', openSettingsModal);

  // JSON 還原檔案輸入
  document.getElementById('json-input').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) handleImportJSON(f);
    e.target.value = '';
  });

  document.getElementById('menu-import').addEventListener('click', () => {
    menu.classList.remove('open');
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) handleImport(f);
    e.target.value = '';
  });
  document.getElementById('menu-export').addEventListener('click', () => {
    menu.classList.remove('open');
    handleExport();
  });
  document.getElementById('menu-about').addEventListener('click', () => {
    menu.classList.remove('open');
    openModal(`
      <div class="modal-header">
        <div class="modal-title">關於知己</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div style="font-size: 14px; line-height: 1.8; color: var(--text-primary);">
        <p style="margin-top:0;"><strong>知己 · Know Yourself</strong></p>
        <p>一個幫你紀錄日常身體、飲食、活動的個人日誌。</p>
        <p>資料完全保存在這個瀏覽器中,不會上傳到任何伺服器。</p>
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 20px;">
          v1.0 · 2026
        </p>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
      </div>
    `);
  });

  // Touch swipe for mobile
  let touchStartX = null;
  let touchStartY = null;
  document.body.addEventListener('touchstart', (e) => {
    if (backdrop.classList.contains('open')) return;
    if (e.target.closest('.cal, input, textarea, select, button')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.body.addEventListener('touchend', (e) => {
    if (touchStartX == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    touchStartX = null;
    if (Math.abs(dx) > 60 && Math.abs(dy) < 40) {
      if (dx > 0) {
        currentDate = fmtDate(addDays(parseDate(currentDate), -1));
      } else {
        currentDate = fmtDate(addDays(parseDate(currentDate), 1));
      }
      renderAll();
    }
  }, { passive: true });
}

// ---------- 啟動 ----------
(async function init() {
  await openDB();
  bindEvents();
  await renderAll();

  // 啟動時做一次同步 (有 queue 就推、順便拉今天最新版)
  setTimeout(async () => {
    const cfg = await getGithubConfig();
    if (!cfg) return;
    if (!navigator.onLine) {
      setSyncStatus('offline');
      return;
    }
    try {
      // 先嘗試拉今天的遠端版本 (避免本機看到舊的)
      try {
        const pulled = await pullDayFromGithub(currentDate);
        if (pulled) renderAll();
      } catch (err) {
        console.warn('Pull on init failed:', err);
      }
      // 再推 queue
      await syncToGithub();
    } catch (err) {
      console.error('Init sync failed:', err);
    }
  }, 800);
})();

</script>
